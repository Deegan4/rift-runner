<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Rift Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #game {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #debug {
      position: absolute;
      top: 8px;
      left: 8px;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      border-radius: 4px;
      display: none;
      pointer-events: none;
      white-space: pre;
    }
    #debug.visible { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="debug"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
